<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cancer Detection</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">

    <style>
        body {
            margin: 0; padding: 0;
            background: url('https://hms.harvard.edu/sites/default/files/media/850-AI-lung-cancer-GettyImages-1409138328.jpg')
                        no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        .auth-container {
            width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(4px) brightness(0.9);
        }

        .forgot-link {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        .forgot-link a {
            color: #007bff;
            font-size: 14px;
            text-decoration: none;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }

        /* Popup styling */
        .popup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
        }

        .popup-box {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            text-align: center;
        }

        .popup-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

    </style>
</head>

<body>

<div class="popup" id="resetPopup">
    <div class="popup-box">
        <h3>Password Reset</h3>
        <p>Enter your registered email</p>

        <input type="email" id="resetEmail" placeholder="Email" class="form-control" required>

        <button class="popup-btn" onclick="sendReset()">Send Reset Link</button>
    </div>
</div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1><i class="fas fa-sign-in-alt"></i> Login</h1>
            <p>Access your account</p>
        </div>

        <div class="auth-body">

            {% with messages = get_flashed_messages(with_categories=True) %}
                {% for category, message in messages %}
                    <div class="alert {{ 'alert-error' if category=='error' else 'alert-success' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="forgot-link">
                    <a href="#" onclick="openReset()">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
        </div>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}" class="auth-link">Register here</a></p>
        </div>
    </div>
</div>

<script>
    function openReset() {
        document.getElementById("resetPopup").style.display = "flex";
    }
    function sendReset() {
        alert("Password reset link sent to " + document.getElementById("resetEmail").value);
        document.getElementById("resetPopup").style.display = "none";
    }
</script>

</body>
</html>
